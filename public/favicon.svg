<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#0077b6"/>
      <stop offset="100%" stop-color="#023e8a"/>
    </linearGradient>

    <linearGradient id="reef" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </linearGradient>
  </defs>

  <!-- Ocean badge -->
  <circle cx="128" cy="128" r="120" fill="url(#ocean)"/>

  <!-- Bubble accents -->
  <circle cx="55" cy="70" r="8" fill="#caf0f8" opacity=".8"/>
  <circle cx="78" cy="45" r="4" fill="#caf0f8" opacity=".7"/>
  <circle cx="195" cy="75" r="6" fill="#caf0f8" opacity=".7"/>

  <!-- Fish body -->
  <path
    d="
    M70 132
    C90 85 160 80 196 126
    C160 172 90 175 70 132
    Z"
    fill="#f8f9fa"
  />

  <!-- Tail -->
  <path
    d="
    M78 132
    L35 92
    L45 132
    L35 172
    Z"
    fill="#ffd166"
  />

  <!-- Fish stripes -->
  <path
    d="M105 96 C125 115 125 150 105 168"
    fill="none"
    stroke="#ff7b00"
    stroke-width="10"
  />

  <path
    d="M140 92 C160 115 160 150 140 170"
    fill="none"
    stroke="#ff7b00"
    stroke-width="10"
  />

  <!-- Eye -->
  <circle cx="172" cy="120" r="10" fill="#023047"/>
  <circle cx="175" cy="116" r="3" fill="white"/>

  <!-- Reef -->
  <path
    d="
    M45 210
    C55 175 65 175 75 210
    C90 160 105 170 115 210
    C135 150 150 170 160 210
    C180 170 195 180 210 210
    Z"
    fill="url(#reef)"
  />

  <!-- Small sand line -->
  <path
    d="M40 220 Q128 240 216 220"
    fill="none"
    stroke="#ffd166"
    stroke-width="8"
    stroke-linecap="round"
  />
</svg>